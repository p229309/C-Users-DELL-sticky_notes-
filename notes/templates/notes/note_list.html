{% extends 'base.html' %}

{% block content %}
<h2>Your Notes</h2>

<a href="{% url 'create_note' %}" class="btn btn-primary">Add Note</a>

<ul class="mt-3">
    {% for note in notes %}
        <li>
            <b>{{ note.title }}</b>
            <a href="{% url 'update_note' note.id %}">Edit</a>
            <a href="{% url 'delete_note' note.id %}">Delete</a>
        </li>
    {% empty %}
        <li>No notes yet</li>
    {% endfor %}
</ul>
{% endblock %}
